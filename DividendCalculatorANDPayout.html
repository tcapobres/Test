<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive-Engine NECTAR Reward Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 750px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #e11d48;
            text-align: center;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #e11d48;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #be123c;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .payout-box {
            background-color: #334155;
            border: 1px solid #475569;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .payout-box input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #475569;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            width: 150px;
            text-align: center;
            margin-right: 10px;
        }
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stat-card {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
        }
        .stat-val {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
            margin-top: 5px;
        }
        #status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #3d3d3d;
            color: #e11d48;
            border-bottom: 2px solid #555;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        tr {
            border-bottom: 1px solid #444;
        }
        tr:hover {
            background-color: #383838;
        }
        .username-col {
            color: #60a5fa;
            font-weight: 600;
        }
        .num-col {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
        }
        .reward-col {
            color: #4ade80;
            font-weight: bold;
        }
        th.right-header {
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NECTAR Proportional Reward Calculator</h2>
    
    <div class="controls">
        <button id="fetchBtn" onclick="fetchAllStakers()">Fetch All Stakers</button>
    </div>

    <div id="status">Click the button above to snapshot current live weights.</div>

    <div class="payout-box" id="payoutSection" style="display: none;">
        <label for="hivePayout" style="font-weight: bold; margin-right: 5px;">Total HIVE to Distribute: </label>
        <input type="number" id="hivePayout" value="100" min="0" step="any" oninput="calculateRewards()">
        <span style="font-weight: bold; color: #4ade80;">HIVE</span>
    </div>

    <div class="stats-box" id="statsStructure" style="display: none;">
        <div class="stat-card">
            <div>Qualified Users (50+ Stake)</div>
            <div id="userCount" class="stat-val">0</div>
        </div>
        <div class="stat-card">
            <div>Total Pool Staked</div>
            <div id="totalStaked" class="stat-val">0 NECTAR</div>
        </div>
    </div>

    <table id="stakersTable" style="display: none;">
        <thead>
            <tr>
                <th>Hive Account</th>
                <th class="right-header">Staked NECTAR</th>
                <th class="right-header">Pool Share</th>
                <th class="right-header">HIVE Reward</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
let verifiedStakers = [];
let totalStakedPool = 0;

async function fetchAllStakers() {
    const fetchBtn = document.getElementById('fetchBtn');
    const statusDiv = document.getElementById('status');
    const table = document.getElementById('stakersTable');
    const statsStructure = document.getElementById('statsStructure');
    const payoutSection = document.getElementById('payoutSection');
    
    fetchBtn.disabled = true;
    table.style.display = "none";
    statsStructure.style.display = "none";
    payoutSection.style.display = "none";
    
    const rpcUrl = "https://api.hive-engine.com/rpc/contracts";
    let allRecords = [];
    let offset = 0;
    const limit = 1000; 
    let hasMore = true;

    try {
        while (hasMore) {
            statusDiv.innerHTML = `Fetching blockchain snapshot rows ${offset + 1} to ${offset + limit}...`;
            
            const payload = {
                jsonrpc: "2.0",
                id: 1,
                method: "find",
                params: {
                    contract: "tokens",
                    table: "balances",
                    query: {
                        symbol: "NECTAR",
                        stake: { "$gt": "0" }
                    },
                    limit: limit,
                    offset: offset
                }
            };

            const response = await fetch(rpcUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const json = await response.json();
            const data = json.result;

            if (data && data.length > 0) {
                allRecords = allRecords.concat(data);
                offset += limit;
                if (data.length < limit) hasMore = false;
            } else {
                hasMore = false;
            }
        }

        verifiedStakers = allRecords.map(item => ({
            account: item.account,
            stake: parseFloat(item.stake || "0")
        }))
        .filter(user => user.stake >= 50);

        verifiedStakers.sort((a, b) => b.stake - a.stake);
        totalStakedPool = verifiedStakers.reduce((sum, user) => sum + user.stake, 0);

        document.getElementById('userCount').innerText = verifiedStakers.length;
        document.getElementById('totalStaked').innerText = totalStakedPool.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 3}) + " NECTAR";

        statusDiv.innerHTML = "Snapshot data loaded successfully.";
        statsStructure.style.display = "grid";
        payoutSection.style.display = "block";
        table.style.display = "table";

        calculateRewards();

    } catch (error) {
        console.error(error);
        statusDiv.innerHTML = `<span style="color: #e11d48;">Error fetching data from Hive-Engine API. Please check your connection.</span>`;
    } finally {
        fetchBtn.disabled = false;
    }
}

function calculateRewards() {
    const hivePayoutInput = document.getElementById('hivePayout').value;
    const totalHiveToDistribute = parseFloat(hivePayoutInput || "0");
    const tableBody = document.getElementById('tableBody');
    
    tableBody.innerHTML = "";
    if (totalStakedPool === 0) return;

    verifiedStakers.forEach(user => {
        const poolShare = user.stake / totalStakedPool;
        const reward = poolShare * totalHiveToDistribute;

        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="username-col">@${user.account}</td>
            <td class="num-col">${user.stake.toFixed(3)}</td>
            <td class="num-col">${(poolShare * 100).toFixed(2)}%</td>
            <td class="num-col reward-col">${reward.toFixed(4)} HIVE</td>
        `;
        tableBody.appendChild(row);
    });
}
</script>
</body>
</html>
