<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELIXIR Dividend Tool</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>Hive Dividend Tool (@nectarbytes)</h2>
    
    <div class="controls">
        <input type="date" id="start"> to <input type="date" id="end">
        <button onclick="runTool()">1. Fetch Voters & Verify Staked ELIXIR</button>
        <br><br>
        <input type="number" id="totalHive" placeholder="Total HIVE to pay" step="0.001">
        <button onclick="showPayments()">2. Generate Payment List</button>
    </div>

    <div id="status"></div>
    <table id="resultTable"><thead><tr><th>User</th><th>Staked ELIXIR</th><th>Payout (HIVE)</th><th>Action</th></tr></thead><tbody id="tbody"></tbody></table>

    <script>
        const client = new dhive.Client(['https://api.hive.blog']);
        let eligibleUsers = [];

        async function runTool() {
            const start = new Date(document.getElementById('start').value).getTime();
            const end = new Date(document.getElementById('end').value).getTime();
            document.getElementById('status').innerText = "Analyzing curation history...";
            
            const history = await client.database.getAccountHistory('nectarbytes', -1, 2000);
            const voters = [...new Set(history.filter(h => h[1].op[0] === 'curation_reward' && h[1].timestamp * 1000 >= start && h[1].timestamp * 1000 <= end).map(h => h[1].op[1].voter))];

            eligibleUsers = [];
            for (let user of voters) {
                // Querying the 'balances' table is more reliable for checking both liquid and staked amounts
                const res = await fetch('https://api.hive-engine.com/rpc/contracts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: "2.0", method: "find", params: { contract: "tokens", table: "balances", query: { symbol: "ELIXIR", account: user } }, id: 1
                    })
                });
                const data = await res.json();
                // Check 'stake' field in the balance object
                const stake = data.result[0] ? parseFloat(data.result[0].stake) : 0;
                if (stake >= 50) eligibleUsers.push({ user, stake });
            }
            document.getElementById('status').innerText = `Found ${eligibleUsers.length} users with 50+ ELIXIR staked.`;
        }

        function showPayments() {
            const total = parseFloat(document.getElementById('totalHive').value);
            if (eligibleUsers.length === 0) { alert("No eligible users found."); return; }
            const payout = (total / eligibleUsers.length).toFixed(3);
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = "";
            eligibleUsers.forEach(u => {
                tbody.innerHTML += `<tr><td>${u.user}</td><td>${u.stake}</td><td>${payout}</td>
                    <td><button onclick="send('${u.user}', '${payout}')">Send</button></td></tr>`;
            });
        }

        function send(user, amount) {
            if (window.hive_keychain) {
                window.hive_keychain.requestTransfer('nectarbytes', user, amount, 'ELIXIR Dividend', 'HIVE', (r) => console.log(r));
            } else {
                alert("Hive Keychain not found!");
            }
        }
    </script>
</body>
</html>
