<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELIXIR Curation Dividend Tool</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; color: #333; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 15px; }
        .stat-display { background: #edf2f7; padding: 15px; border-radius: 6px; font-size: 1.1em; border-left: 5px solid #3182ce; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #cbd5e0; padding: 12px; text-align: left; }
        th { background-color: #edf2f7; }
        button { background: #3182ce; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2b6cb0; }
        button.send-btn { background: #38a169; padding: 6px 12px; font-size: 0.9em; }
        button.send-btn:hover { background: #2f855a; }
        .error-msg { color: #cc0000; background: #fff0f0; padding: 10px; border-radius: 4px; border: 1px solid #ffcccc; margin-top: 10px; }
        select, input { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Hive Curation Dividend Tool (@nectarbytes)</h2>
    
    <div class="controls">
        <div class="flex-row">
            <div>
                <label for="start">Start Date (UTC):</label>
                <input type="date" id="start"> 
            </div>
            <div>
                <label for="end">End Date (UTC):</label>
                <input type="date" id="end">
            </div>
            <button onclick="runTool()">1. Calculate Rewards & Scan Holders</button>
        </div>
        
        <div class="stat-display">
            <strong>Total Pool Value:</strong> <span id="poolDisplay">0.000</span> HP (Calculated from Curation History)
        </div>

        <div class="flex-row">
            <div>
                <label for="distMethod">Distribution Scheme:</label>
                <select id="distMethod" onchange="showPayments()">
                    <option value="proportional">Proportional to ELIXIR Stake</option>
                    <option value="even">Split Evenly Among Eligible Holders</option>
                </select>
            </div>
            <div>
                <label for="totalHive">Override Payout Amount (HIVE):</label>
                <input type="number" id="totalHive" placeholder="Auto-filled from HP" step="0.001">
            </div>
            <button onclick="showPayments()">2. Generate Payment List</button>
        </div>
    </div>

    <div id="status" style="font-weight: bold; color: #0066cc; margin-bottom: 15px; white-space: pre-wrap;"></div>
    
    <table id="resultTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Staked ELIXIR</th>
                <th>Share %</th>
                <th>Payout (HIVE)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const hiveNodes = ['https://api.deathwing.me', 'https://api.hive.blog', 'https://hive-api.arcange.eu'];
        const client = new dhive.Client(hiveNodes);
        
        const engineNodes = [
            'https://api.hive-engine.com/rpc/contracts',
            'https://engine.rishipanthee.com/',
            'https://api2.hive-engine.com/rpc/contracts'
        ];

        let eligibleUsers = [];
        let calculatedHP = 0;

        async function fetchEngine(contract, table, query, limit = 1000, offset = 0) {
            let lastError = null;
            for (let node of engineNodes) {
                try {
                    const res = await fetch(node, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: "2.0", 
                            method: "find", 
                            params: { contract, table, query, limit, offset }, 
                            id: 1
                        })
                    });
                    if (!res.ok) throw new Error(`HTTP status ${res.status}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message || "Engine RPC error");
                    return data.result;
                } catch (err) {
                    console.warn(`Node ${node} failed. Error:`, err.message);
                    lastError = err;
                }
            }
            throw new Error(`All Hive Engine nodes failed. Last error: ${lastError.message}`);
        }

        async function runTool() {
            const startStr = document.getElementById('start').value;
            const endStr = document.getElementById('end').value;
            const statusDiv = document.getElementById('status');
            
            if (!startStr || !endStr) {
                alert("Please select both a start and end date.");
                return;
            }

            statusDiv.className = "";
            statusDiv.innerText = "Connecting to Hive... Fetching network global parameters.";
            
            const startTime = new Date(startStr + 'T00:00:00Z').getTime();
            const endTime = new Date(endStr + 'T23:59:59Z').getTime(); 
            
            try {
                // Get VESTS to HP conversion factors
                const props = await client.database.getDynamicGlobalProperties();
                const totalVestingFund = parseFloat(props.total_vesting_fund_hive);
                const totalVestingShares = parseFloat(props.total_vesting_shares);
                const vestsToHpRatio = totalVestingFund / totalVestingShares;

                statusDiv.innerText = "Pinging account history bounds to prevent node crashes...";

                // FIX 1: Safely ping the node for the absolute latest transaction index (limit of 1)
                // FIX 2: Use an explicit 'condenser_api' call to bypass strict node routing restrictions
                const historyCheck = await client.call('condenser_api', 'get_account_history', ['nectarbytes', -1, 1]);
                
                if (!historyCheck || historyCheck.length === 0) {
                    statusDiv.innerText = "No account history found for @nectarbytes.";
                    return;
                }

                // Extract the absolute highest sequence ID from the end of the returned array
                let startSeq = historyCheck[historyCheck.length - 1][0]; 
                let totalVests = 0;
                let processing = true;

                while (processing && startSeq >= 0) {
                    // FIX 3: Dynamically size the batch. If we are at index 450, we only ask for 450 items, not 1000.
                    const batchSize = Math.min(1000, startSeq);
                    
                    statusDiv.innerText = `Scanning curation rewards... Reading ledger backward from index: ${startSeq}\nCalculated so far: ${(totalVests * vestsToHpRatio).toFixed(3)} HP`;

                    const history = await client.call('condenser_api', 'get_account_history', ['nectarbytes', startSeq, batchSize]);
                    if (!history || history.length === 0) break;

                    const firstSeq = history[0][0];

                    // Loop backward chronologically through the retrieved block
                    for (let i = history.length - 1; i >= 0; i--) {
                        const item = history[i];
                        const op = item[1].op;
                        const timestamp = new Date(item[1].timestamp + 'Z').getTime();

                        if (timestamp < startTime) {
                            processing = false;
                            break;
                        }

                        if (timestamp <= endTime && op[0] === 'curation_reward') {
                            totalVests += parseFloat(op[1].reward);
                        }
                    }

                    // Prevent infinite loops if the node repeats the first sequence boundary
                    if (firstSeq === 0 || startSeq === firstSeq) break;
                    startSeq = firstSeq - 1;
                }

                calculatedHP = totalVests * vestsToHpRatio;
                document.getElementById('poolDisplay').innerText = calculatedHP.toFixed(3);
                document.getElementById('totalHive').value = calculatedHP.toFixed(3);

                // Step 2: Fetch Hive Engine Token Holders
                statusDiv.innerText = "Curation calculation complete. Fetching ELIXIR holders from Hive-Engine...";
                
                let allHolders = [];
                let offset = 0;
                const engineBatch = 1000;
                
                while (true) {
                    statusDiv.innerText = `Downloading Layer-2 token registries (Offset: ${offset})...`;
                    const balances = await fetchEngine("tokens", "balances", { symbol: "ELIXIR" }, engineBatch, offset);
                    if (!balances || balances.length === 0) break;
                    
                    allHolders = allHolders.concat(balances);
                    if (balances.length < engineBatch) break;
                    offset += engineBatch;
                }

                // Filter for users with >= 50 Staked
                eligibleUsers = allHolders
                    .map(b => ({ user: b.account, stake: parseFloat(b.stake) || 0 }))
                    .filter(b => b.stake >= 50);

                statusDiv.innerText = `Success!\nCalculated Curation Earnings: ${calculatedHP.toFixed(3)} HP\nFound ${eligibleUsers.length} accounts holding 50+ Staked ELIXIR.`;
                showPayments();

            } catch (error) {
                console.error("Fatal Script Error:", error);
                statusDiv.className = "error-msg";
                statusDiv.innerText = `⚠️ SYSTEM ERROR DETECTED:\n${error.message}\n\n(Check the browser's developer console for the exact network trace if this persists.)`;
            }
        }

        function showPayments() {
            const totalToPay = parseFloat(document.getElementById('totalHive').value);
            const method = document.getElementById('distMethod').value;
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = "";

            if (isNaN(totalToPay) || totalToPay <= 0) return;
            if (eligibleUsers.length === 0) return;

            const totalStakePool = eligibleUsers.reduce((sum, u) => sum + u.stake, 0);

            eligibleUsers.forEach(u => {
                let payout = 0;
                let sharePct = 0;

                if (method === 'even') {
                    payout = totalToPay / eligibleUsers.length;
                    sharePct = (1 / eligibleUsers.length) * 100;
                } else {
                    sharePct = (u.stake / totalStakePool) * 100;
                    payout = totalToPay * (u.stake / totalStakePool);
                }

                tbody.innerHTML += `<tr>
                    <td><strong>@${u.user}</strong></td>
                    <td>${u.stake.toFixed(3)}</td>
                    <td>${sharePct.toFixed(2)}%</td>
                    <td><strong>${payout.toFixed(3)}</strong></td>
                    <td><button class="send-btn" onclick="send('${u.user}', '${payout.toFixed(3)}')">Send HIVE</button></td>
                </tr>`;
            });
        }

        function send(user, amount) {
            if (window.hive_keychain) {
                window.hive_keychain.requestTransfer('nectarbytes', user, amount, 'ELIXIR Curation Reward Dividend', 'HIVE', (r) => {
                    console.log("Keychain Response:", r);
                });
            } else {
                alert("Hive Keychain browser extension could not be detected.");
            }
        }
    </script>
</body>
</html>
