<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELIXIR Dividend Tool</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>Hive Dividend Tool (@nectarbytes)</h2>
    
    <div class="controls">
        <input type="date" id="start"> to <input type="date" id="end">
        <button onclick="runTool()">1. Fetch Voters & Verify Staked ELIXIR</button>
        <br><br>
        <input type="number" id="totalHive" placeholder="Total HIVE to pay" step="0.001">
        <button onclick="showPayments()">2. Generate Payment List</button>
    </div>

    <div id="status"></div>
    <table id="resultTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Staked ELIXIR</th>
                <th>Payout (HIVE)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const client = new dhive.Client(['https://api.hive.blog']);
        let eligibleUsers = [];

        async function runTool() {
            const startStr = document.getElementById('start').value;
            const endStr = document.getElementById('end').value;
            
            if (!startStr || !endStr) {
                alert("Please select both start and end dates.");
                return;
            }

            const start = new Date(startStr).getTime();
            // Add 86399999ms to include the entire duration of the selected end date
            const end = new Date(endStr).getTime() + 86399999; 
            
            document.getElementById('status').innerText = "Fetching recent posts to analyze active votes...";
            
            try {
                // Fetch the last 100 posts by @nectarbytes
                const posts = await client.database.getDiscussions('blog', { tag: 'nectarbytes', limit: 100 });
                
                let allVoters = new Set();
                
                // Extract all incoming votes that happened within the timeframe
                posts.forEach(post => {
                    if (post.active_votes) {
                        post.active_votes.forEach(vote => {
                            // Append 'Z' to properly parse the UTC time from Hive
                            const voteTime = new Date(vote.time + 'Z').getTime();
                            if (voteTime >= start && voteTime <= end) {
                                allVoters.add(vote.voter);
                            }
                        });
                    }
                });

                const voters = [...allVoters];
                
                if (voters.length === 0) {
                     document.getElementById('status').innerText = "No voters found in that timeframe.";
                     return;
                }

                document.getElementById('status').innerText = `Found ${voters.length} unique voters. Verifying ELIXIR stakes...`;

                eligibleUsers = [];
                for (let user of voters) {
                    const res = await fetch('https://api.hive-engine.com/rpc/contracts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jsonrpc: "2.0", method: "find", params: { contract: "tokens", table: "balances", query: { symbol: "ELIXIR", account: user } }, id: 1
                        })
                    });
                    const data = await res.json();
                    
                    // Safely parse the stake, defaulting to 0 if the user has no balance object
                    const stake = data.result[0] ? parseFloat(data.result[0].stake) : 0;
                    
                    if (stake >= 50) {
                        eligibleUsers.push({ user, stake });
                    }
                }
                
                document.getElementById('status').innerText = `Found ${eligibleUsers.length} eligible users with 50+ ELIXIR staked.`;
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "An error occurred. Check the console for details.";
            }
        }

        function showPayments() {
            const total = parseFloat(document.getElementById('totalHive').value);
            if (isNaN(total) || total <= 0) {
                alert("Please enter a valid total HIVE to pay.");
                return;
            }
            if (eligibleUsers.length === 0) { 
                alert("No eligible users found."); 
                return; 
            }
            
            // Note: This calculates an EQUAL split. 
            // If you want a PROPORTIONAL split based on stake size, you will need to divide the user's stake by the total pooled stake.
            const payout = (total / eligibleUsers.length).toFixed(3);
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = "";
            
            eligibleUsers.forEach(u => {
                tbody.innerHTML += `<tr>
                    <td>${u.user}</td>
                    <td>${u.stake}</td>
                    <td>${payout}</td>
                    <td><button onclick="send('${u.user}', '${payout}')">Send</button></td>
                </tr>`;
            });
        }

        function send(user, amount) {
            if (window.hive_keychain) {
                window.hive_keychain.requestTransfer('nectarbytes', user, amount, 'ELIXIR Dividend', 'HIVE', (r) => console.log(r));
            } else {
                alert("Hive Keychain not found! Please install the browser extension.");
            }
        }
    </script>
</body>
</html>
