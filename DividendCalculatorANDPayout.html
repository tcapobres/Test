<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DividendCalculatorANDPayout.html</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #ffffff; padding: 20px; }
        .container { background-color: #2d2d2d; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        button { background-color: #e11d48; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .action-box { margin-top: 20px; padding: 15px; border: 1px dashed #e11d48; border-radius: 8px; }
        input { padding: 8px; width: 80%; margin-bottom: 10px; }
        #status { margin: 15px 0; color: #4ade80; }
    </style>
</head>
<body>

<div class="container">
    <h2>ELIXIR Reward Calculator</h2>
    <button id="fetchBtn" onclick="fetchAllStakers()">Fetch All Stakers</button>
    <div id="status">Click to load stakers.</div>

    <div class="action-box" id="actionSection" style="display: none;">
        <input type="text" id="sourceAccount" placeholder="Your Hive Username"><br>
        <button onclick="sendBatchHivePayout()">Send Batch Payout</button>
    </div>
</div>

<script>
let verifiedStakers = [];

async function fetchAllStakers() {
    const statusDiv = document.getElementById('status');
    statusDiv.innerHTML = "Fetching...";
    
    try {
        const response = await fetch("https://api2.hive-engine.com/rpc/contracts", {
            method: 'POST',
            body: JSON.stringify({
                jsonrpc: "2.0", id: 1, method: "find",
                params: { contract: "tokens", table: "balances", query: { symbol: "ELIXIR" } }
            })
        });
        const data = await response.json();
        // Filtering for stake > 50 as per previous logic
        verifiedStakers = data.result.filter(s => parseFloat(s.stake) > 50);
        statusDiv.innerHTML = `Loaded ${verifiedStakers.length} stakers.`;
        document.getElementById('actionSection').style.display = 'block';
    } catch (e) {
        statusDiv.innerHTML = "Error fetching data.";
    }
}

async function sendBatchHivePayout() {
    // Ensuring the bridge is detected before attempting communication[span_0](start_span)[span_0](end_span)
    if (typeof window.hive_keychain === 'undefined') {
        alert("Hive Keychain not found. Please use the in-app browser.");
        return;
    }

    const sourceAccount = document.getElementById('sourceAccount').value;
    if (!sourceAccount) return alert("Enter source account");

    // Sequential processing to ensure the mobile app handles one transaction at a time[span_1](start_span)[span_1](end_span)
    for (const staker of verifiedStakers) {
        const amount = "0.001"; // Placeholder amount
        
        await new Promise((resolve) => {
            window.hive_keychain.requestTransfer(
                sourceAccount,
                staker.account,
                amount,
                'ELIXIR Reward',
                'HIVE',
                (response) => {
                    console.log(response);
                    resolve();
                }
            );
        });
    }
    alert("Batch process complete.");
}
</script>
</body>
</html>
