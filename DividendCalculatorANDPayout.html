<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive-Engine NECTAR Reward Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 750px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #e11d48;
            text-align: center;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #e11d48;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #be123c;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .payout-box {
            background-color: #334155;
            border: 1px solid #475569;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .payout-box input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #475569;
            background-color: #1e293b;
            color: white;
            font-size: 16px;
            width: 150px;
            text-align: center;
            margin-right: 10px;
        }
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stat-card {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
        }
        .stat-val {
            font-size: 20px;
            font-weight: bold;
            color: #4ade80;
            margin-top: 5px;
        }
        #status {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #3d3d3d;
            color: #e11d48;
            border-bottom: 2px solid #555;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        tr {
            border-bottom: 1px solid #444;
        }
        tr:hover {
            background-color: #383838;
        }
        .username-col {
            color: #60a5fa;
            font-weight: 600;
        }
        .num-col {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
        }
        .reward-col {
            color: #4ade80;
            font-weight: bold;
        }
        th.right-header {
            text-align: right;
        }
        .action-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #1e293b;
            border: 1px dashed #e11d48;
            border-radius: 8px;
            text-align: center;
        }
        .action-box input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            width: 200px;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-payout {
            background-color: #22c55e;
        }
        .btn-payout:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NECTAR Proportional Reward Calculator</h2>
    
    <div class="controls">
        <button id="fetchBtn" onclick="fetchAllStakers()">Fetch All Stakers</button>
    </div>

    <div id="status">Click the button above to snapshot current live weights.</div>

    <div class="payout-box" id="payoutSection" style="display: none;">
        <div style="margin-bottom: 15px;">
            <label for="hivePayout" style="font-weight: bold; margin-right: 5px;">Total HIVE to Distribute: </label>
            <input type="number" id="hivePayout" value="100" min="0" step="any" oninput="calculateRewards()">
            <span style="font-weight: bold; color: #4ade80;">HIVE</span>
        </div>
    </div>

    <div class="stats-box" id="statsStructure" style="display: none;">
        <div class="stat-card">
            <div>Qualified Users (50+ Stake)</div>
            <div id="userCount" class="stat-val">0</div>
        </div>
        <div class="stat-card">
            <div>Total Pool Staked</div>
            <div id="totalStaked" class="stat-val">0 NECTAR</div>
        </div>
    </div>

    <div class="action-box" id="actionSection" style="display: none;">
        <div style="margin-bottom: 10px; font-weight: bold; color: #f8fafc;">Payout Source Account:</div>
        <input type="text" id="sourceAccount" placeholder="hive-username" autocomplete="off"><br>
        <button id="payoutBtn" class="btn-payout" onclick="sendBatchHivePayout()">Send Batch Payout (1-Click)</button>
    </div>

    <table id="stakersTable" style="display: none;">
        <thead>
            <tr>
                <th>Hive Account</th>
                <th class="right-header">Staked NECTAR</th>
                <th class="right-header">Pool Share</th>
                <th class="right-header">HIVE Reward</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
let verifiedStakers = [];
let totalStakedPool = 0;
let computedOperations = [];

const apiNodes = [
    "https://api2.hive-engine.com/rpc/contracts",
    "https://api.hive-engine.com/rpc/contracts"
];
let currentNodeIndex = 0;

async function makeRpcCall(payload) {
    let attempts = 0;
    while (attempts < apiNodes.length) {
        let activeNode = apiNodes[currentNodeIndex];
        try {
            const response = await fetch(activeNode, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: AbortSignal.timeout(6000)
            });
            if (response.ok) {
                return await response.json();
            }
        } catch (e) {
            console.warn(`Node failure at ${activeNode}. Rolling to alternative layer.`);
        }
        
        currentNodeIndex = (currentNodeIndex + 1) % apiNodes.length;
        attempts++;
    }
    throw new Error("All public Hive-Engine endpoints are unresponsive.");
}

async function fetchAllStakers() {
    const fetchBtn = document.getElementById('fetchBtn');
    const statusDiv = document.getElementById('status');
    const table = document.getElementById('stakersTable');
    const statsStructure = document.getElementById('statsStructure');
    const payoutSection = document.getElementById('payoutSection');
    const actionSection = document.getElementById('actionSection');
    
    fetchBtn.disabled = true;
    table.style.display = "none";
    statsStructure.style.display = "none";
    payoutSection.style.display = "none";
    actionSection.style.display = "none";
    
    let allRecords = [];
    let offset = 0;
    const limit = 1000; 
    let hasMore = true;

    try {
        while (hasMore) {
            statusDiv.innerHTML = `Fetching database snapshot logs: rows ${offset + 1}...`;
            
            const payload = {
                jsonrpc: "2.0",
                id: 1,
                method: "find",
                params: {
                    contract: "tokens",
                    table: "balances",
                    query: {
                        symbol: "NECTAR",
                        stake: { "$gt": "0" }
                    },
                    limit: limit,
                    offset: offset
                }
            };

            const json = await makeRpcCall(payload);
            const data = json.result;

            if (data && data.length > 0) {
                allRecords = allRecords.concat(data);
                offset += limit;
                if (data.length < limit) hasMore = false;
            } else {
                hasMore = false;
            }
        }

        verifiedStakers = allRecords.map(item => ({
            account: item.account,
            stake: parseFloat(item.stake || "0")
        }))
        .filter(user => user.stake >= 50);

        verifiedStakers.sort((a, b) => b.stake - a.stake);
        totalStakedPool = verifiedStakers.reduce((sum, user) => sum + user.stake, 0);

        document.getElementById('userCount').innerText = verifiedStakers.length;
        document.getElementById('totalStaked').innerText = totalStakedPool.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 3}) + " NECTAR";

        statusDiv.innerHTML = "Snapshot data loaded successfully.";
        statsStructure.style.display = "grid";
        payoutSection.style.display = "block";
        actionSection.style.display = "block";
        table.style.display = "table";

        calculateRewards();

    } catch (error) {
        console.error(error);
        statusDiv.innerHTML = `<span style="color: #e11d48; background: #3f1616; padding: 10px; border-radius: 4px; display: block;">⚠️ Error: ${error.message}</span>`;
    } finally {
        fetchBtn.disabled = false;
    }
}

function calculateRewards() {
    const hivePayoutInput = document.getElementById('hivePayout').value;
    const totalHiveToDistribute = parseFloat(hivePayoutInput || "0");
    const tableBody = document.getElementById('tableBody');
    const sourceUser = document.getElementById('sourceAccount').value.trim().toLowerCase().replace('@', '');
    
    tableBody.innerHTML = "";
    computedOperations = [];
    if (totalStakedPool === 0) return;

    verifiedStakers.forEach(user => {
        const poolShare = user.stake / totalStakedPool;
        const reward = poolShare * totalHiveToDistribute;

        // Base Hive protocol requires 3 decimal precision formatted with token type (e.g. "1.000 HIVE")
        if (reward > 0.001) { 
            computedOperations.push([
                "transfer",
                {
                    from: sourceUser || "placeholder", 
                    to: user.account,
                    amount: reward.toFixed(3) + " HIVE",
                    memo: "NECTAR Proportional Stake Reward Payout"
                }
            ]);
        }

        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="username-col">@${user.account}</td>
            <td class="num-col">${user.stake.toFixed(3)}</td>
            <td class="num-col">${(poolShare * 100).toFixed(2)}%</td>
            <td class="num-col reward-col">${reward.toFixed(3)} HIVE</td>
        `;
        tableBody.appendChild(row);
    });
}

// Add event listener to update internal operations object immediately if the user inputs their username late
document.getElementById('sourceAccount').addEventListener('input', calculateRewards);

function sendBatchHivePayout() {
    const statusDiv = document.getElementById('status');
    let sourceUser = document.getElementById('sourceAccount').value.trim().toLowerCase();
    
    if (sourceUser.startsWith('@')) {
        sourceUser = sourceUser.substring(1);
    }

    if (!sourceUser) {
        alert("Please input a valid HIVE account username to send funds from.");
        return;
    }

    // Force a structural recalculation to verify correct 'from' configuration field in the arrays
    calculateRewards();

    if (computedOperations.length === 0) {
        alert("No rewards calculated to distribute.");
        return;
    }

    if (!window.hive_keychain) {
        alert("Hive Keychain extension not detected. Please verify your browser environment.");
        return;
    }

    const confirmPayment = confirm(`Are you sure you want to broadcast a single batch containing ${computedOperations.length} HIVE transfers from @${sourceUser}?`);
    if (!confirmPayment) return;

    statusDiv.innerHTML = `<span style="color: #4ade80;">Sending operations array package to Hive Keychain...</span>`;

    // Package individual arrays directly using native multi-operation arrays
    window.hive_keychain.requestOps(
        sourceUser,
        computedOperations,
        "Active", 
        function(response) {
            if (response.success) {
                statusDiv.innerHTML = `<span style="color: #4ade80; font-size: 18px;">🎉 Batch operations successfully signed and broadcasted! Block ID: ${response.result.id}</span>`;
                alert("Native HIVE distribution sequence completed inside a single block transaction.");
            } else {
                statusDiv.innerHTML = `<span style="color: #e11d48;">Distribution failed. Reason: ${response.message}</span>`;
                alert(`Transaction rejected or aborted: ${response.message}`);
            }
        }
    );
}
</script>
</body>
</html>
