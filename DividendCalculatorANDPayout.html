<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELIXIR Dividend Tool</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h2>Hive Dividend Tool (@nectarbytes)</h2>
    
    <div class="controls">
        <label for="start">Start Date (UTC):</label>
        <input type="date" id="start"> 
        <label for="end">End Date (UTC):</label>
        <input type="date" id="end">
        <button onclick="runTool()">1. Fetch Voters & Verify Staked ELIXIR</button>
        <br><br>
        <input type="number" id="totalHive" placeholder="Total HIVE to pay" step="0.001">
        <button onclick="showPayments()">2. Generate Payment List</button>
    </div>

    <div id="status" style="font-weight: bold; color: #0066cc; margin-bottom: 15px;"></div>
    <table id="resultTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Staked ELIXIR</th>
                <th>Payout (HIVE)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        // Utilizing a failover array of robust public endpoints
        const client = new dhive.Client(['https://api.hive.blog', 'https://api.deathwing.me', 'https://hive-api.arcange.eu']);
        let eligibleUsers = [];

        async function runTool() {
            const startStr = document.getElementById('start').value;
            const endStr = document.getElementById('end').value;
            
            if (!startStr || !endStr) {
                alert("Please select both a start and end date.");
                return;
            }

            // Force browser inputs into exact UTC boundaries to align with the Hive blockchain clock
            const start = new Date(startStr + 'T00:00:00Z').getTime();
            const end = new Date(endStr + 'T23:59:59Z').getTime(); 
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Fetching your last 50 blog posts...";
            
            try {
                const posts = await client.database.getDiscussions('blog', { tag: 'nectarbytes', limit: 50 });
                
                if (!posts || posts.length === 0) {
                    statusDiv.innerText = "No blog posts found for @nectarbytes.";
                    return;
                }

                let allVoters = new Set();
                
                // Directly query the raw voting data for every single post to bypass truncated summaries
                for (let i = 0; i < posts.length; i++) {
                    const post = posts[i];
                    statusDiv.innerText = `Scanning deep vote data for post ${i + 1}/${posts.length}: "${post.title.substring(0, 25)}..."`;
                    
                    try {
                        const votes = await client.database.call('get_active_votes', [post.author, post.permlink]);
                        if (votes && Array.isArray(votes)) {
                            votes.forEach(vote => {
                                const voteTime = new Date(vote.time + 'Z').getTime();
                                if (voteTime >= start && voteTime <= end) {
                                    allVoters.add(vote.voter);
                                }
                            });
                        }
                    } catch (voteErr) {
                        console.error(`Skipped permlink data for: ${post.permlink}`, voteErr);
                    }
                }

                const voters = [...allVoters];
                
                if (voters.length === 0) {
                     statusDiv.innerText = "No votes were found on your recent posts within that specific date range.";
                     return;
                }

                statusDiv.innerText = `Found ${voters.length} unique voters. Fetching stakes from Hive Engine...`;

                eligibleUsers = [];
                for (let i = 0; i < voters.length; i++) {
                    const user = voters[i];
                    statusDiv.innerText = `Checking ELIXIR Layer-2 balances (${i + 1}/${voters.length}): @${user}`;
                    
                    try {
                        const res = await fetch('https://api.hive-engine.com/rpc/contracts', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                jsonrpc: "2.0", 
                                method: "find", 
                                params: { contract: "tokens", table: "balances", query: { symbol: "ELIXIR", account: user } }, 
                                id: 1
                            })
                        });
                        const data = await res.json();
                        
                        const stake = data.result && data.result[0] ? parseFloat(data.result[0].stake) : 0;
                        if (stake >= 50) {
                            eligibleUsers.push({ user, stake });
                        }
                    } catch (tokenErr) {
                        console.error(`Hive Engine node timed out for user ${user}:`, tokenErr);
                    }
                }
                
                statusDiv.innerText = `Done! Found ${eligibleUsers.length} users who upvoted you AND have 50+ staked ELIXIR.`;
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "An unexpected error occurred. Open your browser console (F12) to see details.";
            }
        }

        function showPayments() {
            const total = parseFloat(document.getElementById('totalHive').value);
            if (isNaN(total) || total <= 0) {
                alert("Please enter a valid total amount of HIVE to distribute.");
                return;
            }
            if (eligibleUsers.length === 0) { 
                alert("The eligibility roster is empty. Run step 1 successfully first."); 
                return; 
            }
            
            const payout = (total / eligibleUsers.length).toFixed(3);
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = "";
            
            eligibleUsers.forEach(u => {
                tbody.innerHTML += `<tr>
                    <td>${u.user}</td>
                    <td>${u.stake}</td>
                    <td>${payout}</td>
                    <td><button onclick="send('${u.user}', '${payout}')">Send</button></td>
                </tr>`;
            });
        }

        function send(user, amount) {
            if (window.hive_keychain) {
                window.hive_keychain.requestTransfer('nectarbytes', user, amount, 'ELIXIR Dividend', 'HIVE', (r) => {
                    console.log("Keychain receipt:", r);
                });
            } else {
                alert("Hive Keychain browser extension not found.");
            }
        }
    </script>
</body>
</html>
