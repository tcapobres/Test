<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hive Manual Curation Tool</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; background-color: #fff; color: #333; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; cursor: pointer; background: #e31337; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #results { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .post { margin-bottom: 15px; padding: 15px; border: 1px solid #eee; border-radius: 5px; }
        .ke-badge { background-color: #007bff; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-left: 10px; }
    </style>
</head>
<body>
    <h2>Hive Manual Curation Tool</h2>
    
    <div class="controls">
        <label for="communitySelect">Select a Community:</label>
        <select id="communitySelect">
            <option value="">Loading communities...</option>
        </select>
        
        <label for="maxPayout">Max Payout Filter:</label>
        <input type="number" id="maxPayout" placeholder="e.g. 5">
        
        <button onclick="fetchPosts()">Analyze Community</button>
    </div>

    <div id="results"></div>

    <script>
        window.onload = loadCommunities;

        async function fetchAPI(method, params) {
            const response = await fetch('https://api.hive.blog', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', method: method, params: params, id: 1 })
            });
            const json = await response.json();
            if (json.error) throw new Error(json.error.message);
            return json.result;
        }

        async function loadCommunities() {
            try {
                const communities = await fetchAPI('bridge.list_communities', { limit: 100, sort: 'subs' });
                const select = document.getElementById('communitySelect');
                select.innerHTML = '<option value="">-- Choose a community --</option>';
                communities.forEach(c => {
                    select.innerHTML += `<option value="${c.name}">${c.title}</option>`;
                });
            } catch (err) {
                console.error("Failed to load communities", err);
            }
        }

        async function fetchPosts() {
            const tag = document.getElementById('communitySelect').value;
            const maxPayout = parseFloat(document.getElementById('maxPayout').value) || Infinity;
            const resultsDiv = document.getElementById('results');
            
            if (!tag) return alert("Please select a community first.");
            resultsDiv.innerHTML = "Fetching posts and calculating...";

            try {
                const props = await fetchAPI('condenser_api.get_dynamic_global_properties', []);
                const ratio = parseFloat(props.total_vesting_fund_hive) / parseFloat(props.total_vesting_shares);
                
                const posts = await fetchAPI('bridge.get_ranked_posts', { sort: 'created', tag: tag, limit: 20 });
                
                // Filter: Max 24 hours old AND within Max Payout
                const now = new Date().getTime();
                const oneDayInMs = 24 * 60 * 60 * 1000;
                
                const filtered = posts.filter(p => {
                    const postDate = new Date(p.created + 'Z').getTime();
                    const isRecent = (now - postDate) <= oneDayInMs;
                    return isRecent && parseFloat(p.pending_payout_value) <= maxPayout;
                });

                if (filtered.length === 0) {
                    resultsDiv.innerHTML = "No posts found matching the criteria in the last 24 hours.";
                    return;
                }

                const authors = [...new Set(filtered.map(p => p.author))];
                const accounts = await fetchAPI('condenser_api.get_accounts', [authors]);

                resultsDiv.innerHTML = filtered.map(post => {
                    const acc = accounts.find(a => a.name === post.author);
                    const totalRewards = acc ? (acc.posting_rewards + acc.curation_rewards) / 1000 : 0;
                    const currentHP = acc ? (parseFloat(acc.vesting_shares) * ratio) : 0;
                    const ke = currentHP > 0 ? (totalRewards / currentHP).toFixed(2) : "0.00";

                    return `
                    <div class="post">
                        <a href="https://hive.blog${post.url}" target="_blank">${post.title}</a>
                        <span class="ke-badge">Lifetime KE: ${ke}</span><br>
                        <small>Author: @${post.author} | Payout: ${post.pending_payout_value}</small>
                    </div>`;
                }).join('');
            } catch (err) {
                resultsDiv.innerHTML = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
