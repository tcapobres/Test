<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR Delegation Payout Calculator</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .card { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { color: #8b5cf6; text-align: center; margin-bottom: 20px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input { background: #1e293b; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; outline: none; }
        button { background: #8b5cf6; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #7c3aed; }
        .btn-secondary { background: #334155; margin-left: 10px; }
        .btn-success { background: #10b981; margin-left: 10px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; color: #64748b; font-size: 0.7rem; padding: 10px; border-bottom: 2px solid #334155; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .loading-bar { color: #fbbf24; text-align: center; padding: 20px; font-weight: bold; }
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>@nectarbytes Reward Scanner (ELIXIR)</h2>
    <div class="config-grid">
        <div class="input-group"><label>Start Date</label><input type="date" id="startDate"></div>
        <div class="input-group"><label>End Date</label><input type="date" id="endDate"></div>
        <div class="input-group"><label>ELIXIR Price (Market/Manual)</label><input type="number" id="priceInput" value="0.0" step="0.000001"></div>
        <button onclick="calculateRewards()">Run Time-Frame Scan</button>
    </div>
    <div id="status"></div>
    <div id="content" style="display:none;">
        <div class="stats">
            <div class="stat-box">
                <span id="totalCuration" class="val" style="color: #fff;">0.00</span>
                <span style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase;">HIVE Earned</span>
            </div>
            <div class="stat-box">
                <span id="opCount" class="val" style="color: #fff;">0</span>
                <span style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase;">Rewards Found</span>
            </div>
            <div class="stat-box" style="background: #2e1065;">
                <span id="totalElixir" class="val" style="color: #8b5cf6;">0.000000</span>
                <span style="font-size: 0.65rem; color: #c4b5fd; text-transform: uppercase;">ELIXIR to Issue</span>
            </div>
        </div>
        <div class="action-bar">
            <button class="btn-secondary" onclick="downloadCSV()">Download CSV</button>
            <button class="btn-success" onclick="processKeychainPayouts()">Process Keychain Payouts</button>
        </div>
        <table>
            <thead><tr><th>Delegator</th><th>Weight</th><th>HIVE Share</th><th>ELIXIR to Issue</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</div>

<script>
    const client = new dhive.Client(["https://api.deathwing.me", "https://api.hive.blog"]);
    const target = 'nectarbytes';
    let scanResults = []; 
    const today = new Date();
    const lastWeek = new Date();
    lastWeek.setDate(today.getDate() - 7);
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    document.getElementById('startDate').value = lastWeek.toISOString().split('T')[0];

    async function getMarketPrice() {
        try {
            const res = await fetch('https://api.hive-engine.com/rpc/contracts', {
                method: 'POST',
                body: JSON.stringify({ jsonrpc: "2.0", method: "find", params: { contract: "market", table: "metrics", query: { symbol: "ELIXIR" }, limit: 1 }, id: 1 })
            });
            const data = await res.json();
            return data.result.length > 0 ? parseFloat(data.result[0].lastPrice) : 1.0;
        } catch(e) { return 1.0; }
    }

    async function calculateRewards() {
        const status = document.getElementById('status');
        status.style.display = 'block';
        let price = parseFloat(document.getElementById('priceInput').value);
        if (price <= 0) {
            price = await getMarketPrice();
            document.getElementById('priceInput').value = price.toFixed(6);
        }
        status.innerHTML = '<div class="loading-bar">Scanning history...</div>';
        const startTs = new Date(document.getElementById('startDate').value).getTime();
        const endTs = new Date(document.getElementById('endDate').value).getTime() + 86400000; 
        document.getElementById('content').style.display = 'none';
        scanResults = []; 
        try {
            const props = await client.database.getDynamicGlobalProperties();
            const hpRate = parseFloat(props.total_vesting_fund_hive) / parseFloat(props.total_vesting_shares);
            const accountInfo = await client.database.getAccounts([target]);
            const targetReceivedVests = parseFloat(accountInfo[0].received_vesting_shares);
            let activeDelegations = new Map(), totalCurationVests = 0, rewardsCount = 0, lastId = -1, finishedScanningDelegations = false;
            while (true) {
                let currentLimit = 1000;
                if (lastId !== -1 && lastId < 1000) currentLimit = lastId + 1;
                const history = await client.database.getAccountHistory(target, lastId, currentLimit);
                if (!history || history.length === 0) break;
                [...history].reverse().forEach(item => {
                    const op = item[1].op, ts = new Date(item[1].timestamp + 'Z').getTime();
                    if (ts >= startTs && ts <= endTs && op[0] === 'curation_reward') { totalCurationVests += parseFloat(op[1].reward); rewardsCount++; }
                    if (!finishedScanningDelegations && op[0] === 'delegate_vesting_shares' && op[1].delegatee === target) {
                        const v = parseFloat(op[1].vesting_shares);
                        if (v > 0) activeDelegations.set(op[1].delegator, v); else activeDelegations.delete(op[1].delegator);
                    }
                });
                let tracked = 0; activeDelegations.forEach(v => tracked += v);
                if (Math.abs(tracked - targetReceivedVests) < 1.0) finishedScanningDelegations = true;
                if (new Date(history[0][1].timestamp + 'Z').getTime() < startTs && finishedScanningDelegations) break;
                if (history[0][0] === 0) break; lastId = history[0][0] - 1;
            }
            let totalVests = 0; activeDelegations.forEach((v, u) => { if (u !== 'bulliontools') totalVests += v; });
            const totalHive = totalCurationVests * hpRate;
            let totalElixirGlobal = 0, rows = document.getElementById('rows'); rows.innerHTML = '';
            activeDelegations.forEach((vests, user) => {
                if (user === 'bulliontools') return;
                const share = vests / totalVests, userHive = totalHive * share, elixir = userHive * (price * 0.5);
                totalElixirGlobal += elixir;
                scanResults.push({ delegator: user, weight: (share * 100).toFixed(2), hiveShare: userHive.toFixed(3), elixirToIssue: elixir.toFixed(6) });
                rows.innerHTML += `<tr><td><strong>@${user}</strong></td><td>${(share * 100).toFixed(2)}%</td><td>${userHive.toFixed(3)} HIVE</td><td style="color:#8b5cf6; font-weight:bold;">${elixir.toFixed(6)} ELIXIR</td></tr>`;
            });
            document.getElementById('totalCuration').innerText = totalHive.toFixed(3);
            document.getElementById('opCount').innerText = rewardsCount;
            document.getElementById('totalElixir').innerText = totalElixirGlobal.toFixed(6);
            status.style.display = 'none'; document.getElementById('content').style.display = 'block';
        } catch (e) { status.innerHTML = `<div style="color:#f87171; text-align:center;">Scan Failed: ${e.message}</div>`; }
    }
    function downloadCSV() {
        let csv = "Delegator,Weight,HIVE Share,ELIXIR to Issue\n";
        scanResults.forEach(r => csv += `${r.delegator},${r.weight},${r.hiveShare},${r.elixirToIssue}\n`);
        const link = document.createElement("a"); link.href = encodeURI("data:text/csv," + csv); link.download = "payouts.csv"; link.click();
    }
    function processKeychainPayouts() {
        const ops = scanResults.filter(r => parseFloat(r.elixirToIssue) > 0).map(r => ({
            contractName: "tokens", contractAction: "transfer", contractPayload: { symbol: "ELIXIR", to: r.delegator, quantity: r.elixirToIssue, memo: "ELIXIR Reward" }
        }));
        window.hive_keychain.requestCustomJson(target, "ssc-mainnet-hive", "Active", JSON.stringify(ops), "ELIXIR Distribution", res => { if (res.success) alert("Payout successful!"); });
    }
</script>
</body>
</html>
