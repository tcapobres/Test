<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR Time-Frame Issuer</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .card { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { color: #8b5cf6; text-align: center; margin-bottom: 20px; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input { background: #1e293b; border: 1px solid #475569; color: white; padding: 8px; border-radius: 6px; outline: none; }
        button { background: #8b5cf6; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #7c3aed; }
        .btn-secondary { background: #334155; margin-left: 10px; }
        .btn-success { background: #10b981; margin-left: 10px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .val { display: block; font-size: 1.2rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { text-align: left; color: #64748b; font-size: 0.7rem; padding: 10px; border-bottom: 2px solid #334155; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 0.85rem; }
        .loading-bar { color: #fbbf24; text-align: center; padding: 20px; font-weight: bold; }
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>@nectarbytes Reward Scanner (Prorated)</h2>
    
    <div class="config-grid">
        <div class="input-group">
            <label>Start Date</label>
            <input type="date" id="startDate">
        </div>
        <div class="input-group">
            <label>End Date</label>
            <input type="date" id="endDate">
        </div>
        <div class="input-group">
            <label>ELIXIR Price</label>
            <input type="number" id="priceInput" value="1.0" step="0.1">
        </div>
        <button onclick="calculateRewards()">Run Time-Frame Scan</button>
    </div>

    <div id="status"></div>

    <div id="content" style="display:none;">
        <div class="stats">
            <div class="stat-box">
                <span id="totalCuration" class="val" style="color: #fff;">0.00</span>
                <span style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase;">HIVE Earned</span>
            </div>
            <div class="stat-box">
                <span id="opCount" class="val" style="color: #fff;">0</span>
                <span style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase;">Rewards Found</span>
            </div>
            <div class="stat-box" style="background: #2e1065;">
                <span id="totalElixir" class="val" style="color: #8b5cf6;">0.000000</span>
                <span style="font-size: 0.65rem; color: #c4b5fd; text-transform: uppercase;">ELIXIR to Issue</span>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-secondary" onclick="downloadCSV()">Download CSV</button>
            <button class="btn-success" onclick="processKeychainPayouts()">Process Keychain Payouts</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Delegator</th>
                    <th>Effective Weight</th>
                    <th>HIVE Share</th>
                    <th>ELIXIR to Issue</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</div>

<script>
    const client = new dhive.Client(["https://api.deathwing.me", "https://api.hive.blog"]);
    const target = 'nectarbytes';
    let scanResults = []; 

    const today = new Date();
    const lastWeek = new Date();
    lastWeek.setDate(today.getDate() - 7);
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    document.getElementById('startDate').value = lastWeek.toISOString().split('T')[0];

    async function calculateRewards() {
        const status = document.getElementById('status');
        status.style.display = 'block';
        const price = parseFloat(document.getElementById('priceInput').value);
        const startTs = new Date(document.getElementById('startDate').value).getTime();
        const endTs = new Date(document.getElementById('endDate').value).getTime() + 86400000; 
        const totalDuration = endTs - startTs;

        status.innerHTML = '<div class="loading-bar">Initializing historical ledger analysis...</div>';
        document.getElementById('content').style.display = 'none';
        scanResults = []; 

        try {
            const props = await client.database.getDynamicGlobalProperties();
            const hpRate = parseFloat(props.total_vesting_fund_hive) / parseFloat(props.total_vesting_shares);
            const accountInfo = await client.database.getAccounts([target]);
            const targetReceivedVests = parseFloat(accountInfo[0].received_vesting_shares);

            let activeDelegationsForTrack = new Map();
            let allDelegationOps = [];
            let totalCurationVests = 0;
            let rewardsCount = 0;
            let lastId = -1; 
            let finishedScanningDelegations = false;

            // Step 1: Scan historical ledger backwards to collect curation rewards and all delegation configurations
            while (true) {
                let currentLimit = 1000;
                if (lastId !== -1 && lastId < 1000) currentLimit = lastId + 1;
                const history = await client.database.getAccountHistory(target, lastId, currentLimit);
                if (!history || history.length === 0) break;
                const reversed = [...history].reverse();

                for (const item of reversed) {
                    const op = item[1].op;
                    const timestamp = new Date(item[1].timestamp + 'Z').getTime();
                    
                    if (timestamp >= startTs && timestamp <= endTs) {
                        if (op[0] === 'curation_reward') {
                            totalCurationVests += parseFloat(op[1].reward);
                            rewardsCount++;
                        }
                    }
                    
                    if (op[0] === 'delegate_vesting_shares' && op[1].delegatee === target) {
                        const delegator = op[1].delegator;
                        const vests = parseFloat(op[1].vesting_shares);
                        
                        // Collect delegation operations for chronological analysis
                        allDelegationOps.push({ delegator, vests, timestamp });
                        
                        // Guard check to ensure we have found the baseline snapshot of current living configurations
                        if (!finishedScanningDelegations) {
                            if (!activeDelegationsForTrack.has(delegator)) {
                                activeDelegationsForTrack.set(delegator, vests);
                            }
                        }
                    }
                }
                
                if (!finishedScanningDelegations) {
                    let trackedVestsTotal = 0;
                    activeDelegationsForTrack.forEach(v => trackedVestsTotal += v);
                    if (Math.abs(trackedVestsTotal - targetReceivedVests) < 1.0) finishedScanningDelegations = true;
                }
                
                const oldestTimestampFetched = new Date(history[0][1].timestamp + 'Z').getTime();
                // Break only if we have crossed backward past the start window and have mapped all existing delegations
                if (oldestTimestampFetched < startTs && finishedScanningDelegations) break;
                if (history[0][0] === 0) break;
                lastId = history[0][0] - 1; 
                status.innerHTML = `<div class="loading-bar">Scanning history (Index: ${lastId})...</div>`;
            }

            // Step 2: Sort operations chronologically to accurately process time segments
            allDelegationOps.sort((a, b) => a.timestamp - b.timestamp);

            let currentDelegations = new Map();
            let userAccumulatedVestMs = new Map();
            let lastTimestamp = startTs;

            for (const op of allDelegationOps) {
                const timestamp = op.timestamp;

                // Establish baseline states that happened before the selected window starts
                if (timestamp < startTs) {
                    if (op.vests > 0) currentDelegations.set(op.delegator, op.vests); 
                    else currentDelegations.delete(op.delegator);
                    continue;
                }

                // If an operation happens inside or after our window, calculate the weight for the period since lastTimestamp
                const segmentEnd = Math.min(timestamp, endTs);
                if (segmentEnd > lastTimestamp) {
                    const duration = segmentEnd - lastTimestamp;
                    currentDelegations.forEach((vests, user) => {
                        const currentAcc = userAccumulatedVestMs.get(user) || 0;
                        userAccumulatedVestMs.set(user, currentAcc + (vests * duration));
                    });
                    lastTimestamp = segmentEnd;
                }

                if (timestamp > endTs) break;

                // Apply changes to the active state tracker
                if (op.vests > 0) currentDelegations.set(op.delegator, op.vests); 
                else currentDelegations.delete(op.delegator);
            }

            // Handle the remaining time segment up to the exact window closure timestamp
            if (endTs > lastTimestamp) {
                const duration = endTs - lastTimestamp;
                currentDelegations.forEach((vests, user) => {
                    const currentAcc = userAccumulatedVestMs.get(user) || 0;
                    userAccumulatedVestMs.set(user, currentAcc + (vests * duration));
                });
            }

            // Step 3: Compute Time-Weighted Average Effective Vesting Shares per user
            let totalEffectiveVests = 0;
            let effectiveDelegations = new Map();

            userAccumulatedVestMs.forEach((accumulatedVests, user) => {
                if (user === 'bulliontools') return;
                const effectiveVests = accumulatedVests / totalDuration;
                if (effectiveVests > 0) {
                    effectiveDelegations.set(user, effectiveVests);
                    totalEffectiveVests += effectiveVests;
                }
            });

            // Step 4: Map payouts using the newly derived Time-Weighted Prorated Shares
            const totalHive = totalCurationVests * hpRate;
            const rows = document.getElementById('rows');
            rows.innerHTML = '';
            let totalElixirGlobal = 0;

            effectiveDelegations.forEach((effectiveVests, user) => {
                const share = totalEffectiveVests > 0 ? (effectiveVests / totalEffectiveVests) : 0;
                const hiveShare = totalHive * share;
                // Formula remains unchanged: ELIXIR = HIVE Share * (Price * 0.5)
                const elixir = hiveShare * (price * 0.5);
                totalElixirGlobal += elixir;
                
                scanResults.push({ 
                    delegator: user, 
                    weight: (share * 100).toFixed(2), 
                    hiveShare: hiveShare.toFixed(3), 
                    elixirToIssue: elixir.toFixed(6) 
                });
                
                rows.innerHTML += `<tr><td><strong>@${user}</strong></td><td>${(share * 100).toFixed(2)}%</td><td>${hiveShare.toFixed(3)} HIVE</td><td style="color:#8b5cf6; font-weight:bold;">${elixir.toFixed(6)} ELIXIR</td></tr>`;
            });

            document.getElementById('totalCuration').innerText = totalHive.toFixed(3);
            document.getElementById('opCount').innerText = rewardsCount;
            document.getElementById('totalElixir').innerText = totalElixirGlobal.toFixed(6);
            status.style.display = 'none';
            document.getElementById('content').style.display = 'block';
        } catch (e) {
            status.innerHTML = `<div style="color:#f87171; text-align:center;">Scan Failed: ${e.message}</div>`;
        }
    }

    function downloadCSV() {
        if (scanResults.length === 0) return;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        let csvContent = "data:text/csv;charset=utf-8,Delegator,Weight,HIVE Share,ELIXIR to Issue\n";
        scanResults.forEach(row => { csvContent += `${row.delegator},${row.weight},${row.hiveShare},${row.elixirToIssue}\n`; });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `elixir_payouts_${startDate}_to_${endDate}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function processKeychainPayouts() {
        if (!window.hive_keychain) { alert("Hive Keychain not detected."); return; }
        const validPayouts = scanResults.filter(row => parseFloat(row.elixirToIssue) > 0);
        if (validPayouts.length === 0) return;
        const txOperations = validPayouts.map(row => ({
            contractName: "tokens",
            contractAction: "transfer",
            contractPayload: { symbol: "ELIXIR", to: row.delegator, quantity: row.elixirToIssue, memo: `ELIXIR Reward Payout (${document.getElementById('startDate').value} to ${document.getElementById('endDate').value})` }
        }));
        window.hive_keychain.requestCustomJson(target, "ssc-mainnet-hive", "Active", JSON.stringify(txOperations), "ELIXIR Automated Distribution", (res) => {
            if (res.success) alert("Payout successful!");
        });
    }
</script>
</body>
</html>
