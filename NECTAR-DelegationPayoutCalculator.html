<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR Mobile Payout</title>
    <script src="https://unpkg.com/@hiveio/dhive@latest/dist/dhive.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; padding: 15px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #475569; }
        input { background: #0f172a; color: white; }
        button { background: #8b5cf6; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h3>ELIXIR Payout Tool</h3>
    <input type="number" id="priceInput" placeholder="Enter ELIXIR Price" step="0.000001">
    <button onclick="calculateRewards()">Scan & Prepare Payout</button>
    <button id="payoutBtn" style="display:none; background:#10b981;" onclick="processKeychainPayouts()">Send Batch Payouts</button>
    <div id="status"></div>
</div>
<script>
    const client = new dhive.Client(["https://api.deathwing.me", "https://api.hive.blog"]);
    const target = 'nectarbytes';
    let scanResults = [];
    async function calculateRewards() {
        const price = parseFloat(document.getElementById('priceInput').value);
        if(!price) { alert("Please enter a price"); return; }
        document.getElementById('status').innerText = "Scanning...";
        const props = await client.database.getDynamicGlobalProperties();
        const hpRate = parseFloat(props.total_vesting_fund_hive) / parseFloat(props.total_vesting_shares);
        const history = await client.database.getAccountHistory(target, -1, 1000);
        let activeDelegations = new Map(), totalCurationVests = 0;
        history.forEach(item => {
            const op = item[1].op;
            if(op[0] === 'curation_reward') totalCurationVests += parseFloat(op[1].reward);
            if(op[0] === 'delegate_vesting_shares' && op[1].delegatee === target) {
                const v = parseFloat(op[1].vesting_shares);
                if(v > 0) activeDelegations.set(op[1].delegator, v); else activeDelegations.delete(op[1].delegator);
            }
        });
        let totalVests = 0; activeDelegations.forEach(v => totalVests += v);
        const totalHive = totalCurationVests * hpRate;
        scanResults = [];
        activeDelegations.forEach((vests, user) => {
            if(user === 'bulliontools') return;
            const elixir = (totalHive * (vests / totalVests)) * (price * 0.5);
            if(elixir > 0.001) scanResults.push({to: user, qty: elixir.toFixed(6)});
        });
        document.getElementById('status').innerText = "Found " + scanResults.length + " payouts.";
        document.getElementById('payoutBtn').style.display = 'block';
    }
    function processKeychainPayouts() {
        if(!window.hive_keychain) { alert("Keychain not found."); return; }
        const ops = scanResults.map(r => ({
            contractName: "tokens", contractAction: "transfer",
            contractPayload: { symbol: "ELIXIR", to: r.to, quantity: r.qty, memo: "ELIXIR Reward" }
        }));
        window.hive_keychain.requestCustomJson(target, "ssc-mainnet-hive", "Active", JSON.stringify(ops), "ELIXIR Batch Payout", res => {
            if(res.success) alert("Success!");
        });
    }
</script>
</body>
</html>
